async function startFocus(){
try{const session=await post('/focus/start',{childId:'xiaoming',config:{focusMinutes:gcfg().foc,breakMinutes:2,totalRounds:3}});
S.focusSessionId=session.sessionId;showStatus('дё“жіЁдјҡиҜқе·ІеҲӣе»ә');
}catch(e){showStatus('еҗҺз«ҜжңӘиҝһжҺҘпјҢжң¬ең°и®Ўж—¶',false);}
S.fPhase='run';S.fRound=1;S.fFocus=true;S.fSec=gcfg().foc*60;
S.fTid=setInterval(()=>{S.fSec--;if(S.fSec<=0)skipFocus();R();},1000);R();}
function skipFocus(){if(S.fFocus){S.fFocus=false;S.fSec=120;
if(S.focusSessionId)post('/focus/complete-round',{sessionId:S.focusSessionId}).catch(()=>{});
}else{S.fRound++;if(S.fRound>3){stopFocus();return;}S.fFocus=true;S.fSec=gcfg().foc*60;}R();}
function stopFocus(){if(S.fTid)clearInterval(S.fTid);S.fTid=null;S.fPhase='ready';S.focusSessionId=null;R();}

function openTwoPhaseModal(title,subtitle,originals,variants,tip,answers,practiceKey){
  var modal=document.createElement('div');
  modal.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:999';
  var state={phase:'retry',idx:0,retryCorrect:0,retryTotal:originals.length,variantCorrect:0,variantIdx:0};
  function render(){
    if(state.phase==='retry'){

      var o=originals[state.idx];
      modal.querySelector('.modal-body').innerHTML=
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px"><span style="font-size:11px;padding:2px 8px;background:#FEE2E2;color:#DC2626;border-radius:10px">йҳ¶ж®өдёҖпјҡй”ҷйўҳйҮҚз»ғ</span><span style="font-size:11px;color:var(--g5)">'+(state.idx+1)+'/'+originals.length+'</span></div>'
      +'<div style="padding:12px;background:#FEF2F2;border-radius:8px;margin-bottom:10px;border-left:3px solid #EF4444">'
      +'<div style="font-size:13px;font-weight:600;margin-bottom:4px">'+o.q+'</div>'
      +'<div style="font-size:11px;color:var(--d)">дёҠж¬ЎдҪ зҡ„зӯ”жЎҲпјҡ<s>'+o.wrong+'</s></div></div>'
      +'<div style="padding:8px;background:#FEF3C7;border-radius:8px;font-size:12px;margin-bottom:10px">рҹ’Ў '+tip+'</div>'
      +'<div style="display:flex;gap:8px"><input type="text" id="retryAns" placeholder="йҮҚж–°дҪңзӯ”" style="flex:1;padding:8px;border:1px solid var(--g2);border-radius:8px;font-size:14px" onkeydown="if(event.key===\'Enter\')checkRetry()">'
      +'<button onclick="checkRetry()" style="padding:8px 16px;background:var(--p);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer">жҸҗдәӨ</button></div>'
      +'<div id="retryFeedback"></div>';
    } else if(state.phase==='variant'){
      if(state.variantIdx>=variants.length||state.variantCorrect>=3){
        state.phase='done';render();return;
      }
      var v=variants[state.variantIdx];
      var phaseLabel=state.retryTotal>0?'<span style="font-size:11px;padding:2px 8px;background:#DBEAFE;color:#1E40AF;border-radius:10px">йҳ¶ж®өдәҢпјҡдёҫдёҖеҸҚдёү</span>':'';
      modal.querySelector('.modal-body').innerHTML=
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">'+phaseLabel+'<span style="font-size:11px;color:var(--g5)">иҝһз»ӯзӯ”еҜ№ '+state.variantCorrect+'/3</span></div>'
      +'<div style="padding:12px;background:#EFF6FF;border-radius:8px;margin-bottom:10px;border-left:3px solid #3B82F6">'
      +'<div style="font-size:13px;font-weight:600">'+v+'</div></div>'
      +'<div style="padding:8px;background:#FEF3C7;border-radius:8px;font-size:12px;margin-bottom:10px">рҹ’Ў '+tip+'</div>'
      +'<div style="display:flex;gap:8px"><input type="text" id="variantAns" placeholder="дҪңзӯ”" style="flex:1;padding:8px;border:1px solid var(--g2);border-radius:8px;font-size:14px" onkeydown="if(event.key===\'Enter\')checkVariant()">'
      +'<button onclick="checkVariant()" style="padding:8px 16px;background:#3B82F6;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer">жҸҗдәӨ</button></div>'
      +'<div id="variantFeedback"></div>';
    } else {
      var mastered=state.variantCorrect>=3;
      var showRetry=state.retryTotal>0;
      // Mark mastery on the weekly report page
      if(mastered&&practiceKey){markMasteredOnPage(practiceKey);}
      modal.querySelector('.modal-body').innerHTML=
      '<div style="text-align:center;padding:20px">'
      +'<div style="font-size:32px;margin-bottom:8px">'+(mastered?'рҹҺү':'рҹ’Ә')+'</div>'
      +'<div style="font-size:16px;font-weight:700;margin-bottom:12px">'+(mastered?'е·ІжҺҢжҸЎпјҒ':'з»§з»ӯеҠ жІ№')+'</div>'
      +'<div style="display:flex;justify-content:center;gap:16px;margin-bottom:16px">'

      +'<div style="text-align:center"><div style="font-size:20px;font-weight:700;color:'+(state.variantCorrect>=3?'#10B981':'#F59E0B')+'">'+state.variantCorrect+'/3</div><div style="font-size:11px;color:var(--g5)">'+(showRetry?'дёҫдёҖеҸҚдёү':'еҗҢзҹҘиҜҶзӮ№з»ғд№ ')+'</div></div></div>'
      +'<div style="font-size:12px;color:var(--g5);margin-bottom:12px">'+(mastered?'иҝһз»ӯзӯ”еҜ№3йҒ“ж–°йўҳпјҢиҜҘзҹҘиҜҶзӮ№е·Іж Үи®°дёәжҺҢжҸЎ':'ж–°йўҳиҝҳйңҖе·©еӣәпјҢдёӢж¬Ўдјҡз»§з»ӯжҺЁиҚҗ')+'</div>'
      +'<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="padding:10px 24px;background:var(--p);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer">е®ҢжҲҗ</button></div>';
    }
  }
  window.checkRetry=function(){

    if(correct){state.retryCorrect++;document.getElementById('retryFeedback').innerHTML='<div style="margin-top:8px;padding:8px;background:#ECFDF5;border-radius:8px;font-size:13px;color:#065F46">вң… жӯЈзЎ®пјҒиҝҷж¬Ўзӯ”еҜ№дәҶ</div>';

  window.checkVariant=function(){

    setTimeout(function(){state.variantIdx++;render();},1200);
  };
  modal.innerHTML='<div style="background:#fff;border-radius:16px;padding:20px;max-width:420px;width:95%;max-height:85vh;overflow-y:auto">'

  document.body.appendChild(modal);
  render();

    if(b.textContent.includes('з»ғд№ ')&&b.onclick&&b.onclick.toString().indexOf(key)!==-1){
      // Already handled below
    }
  }
  // Find the item in the weekly report by text content
  var items=document.querySelectorAll('div[style*="border-bottom"]');
  for(var j=0;j<items.length;j++){
    var item=items[j];
    if(item.textContent.indexOf(key)!==-1){
      // Check if already marked
      if(item.querySelector('.mastered-badge'))continue;
      var badge=document.createElement('span');
      badge.className='mastered-badge';
      badge.style.cssText='display:inline-block;padding:2px 8px;background:#10B981;color:#fff;border-radius:10px;font-size:10px;font-weight:600;margin-left:6px';
      badge.textContent='вң… е·ІжҺҢжҸЎ';
      // Insert badge after the first line
      var firstDiv=item.querySelector('div');
      if(firstDiv)firstDiv.appendChild(badge);
      // Disable the practice button in this item
      var btn=item.querySelector('button');
      if(btn){btn.disabled=true;btn.style.opacity='0.5';btn.textContent='вң… е·ІжҺҢжҸЎ';}
      break;
    }
  }
}

  <div style="font-size:11px;color:var(--p);margin-top:2px">рҹ’Ў ${it.aiTip}</div></div>
  <span class="b ${it.priority==='high'?'b-d':it.priority==='medium'?'b-w':'b-s'}">${it.priority==='high'?'зҙ§жҖҘ':it.priority==='medium'?'жҳҺж—Ҙ':'е®ҪиЈ•'}</span></div>`;}).join('')}</div>
  <div class="cd"><div class="tt">рҹ“Ҡ жң¬е‘Ёе®ҢжҲҗжғ…еҶө</div>

async function startFiveStep(){
S.fsWords=[{character:'иҠұ',pinyin:'huДҒ',meaning:'иҠұжңө',radicalExplanation:'иү№иЎЁзӨәжӨҚзү©',exampleSentence:'иҠұеӣӯйҮҢејҖж»ЎдәҶиҠұгҖӮ',strokeCount:7},
{character:'йёҹ',pinyin:'niЗҺo',meaning:'йёҹзұ»',radicalExplanation:'иұЎеҪўеӯ—',exampleSentence:'ж ‘дёҠжңүдёҖеҸӘе°ҸйёҹгҖӮ',strokeCount:5}];
try{const r=await post('/five-step/create',{sessionId:'fs-'+Date.now(),childId:'xiaoming',childGrade:S.grade,words:S.fsWords});
S.fsSession=r;showStatus('дә”жӯҘжі•дјҡиҜқе·ІеҲӣе»ә');
}catch(e){S.fsSession={sessionId:'local',childId:'xiaoming',childGrade:S.grade,currentWordIndex:0,currentStep:'recognize',totalWords:2,completedWords:0,isComplete:false};showStatus('жң¬ең°жЁЎејҸ',false);}R();}

async function doFsRecognize(){
try{const r=await post('/five-step/recognize',{sessionId:S.fsSession.sessionId});
document.getElementById('recogResult').innerHTML=`<div class="ml">рҹӨ– AI</div><strong>ж•…дәӢпјҡ</strong>${r.storyExplanation}<br><strong>еҒҸж—Ғпјҡ</strong>${r.radicalBreakdown}`;
S.fsSession.currentStep='read';setTimeout(R,1500);
}catch(e){S.fsSession.currentStep='read';R();}}

async function doFsRead(score,tone){
try{const r=await post('/five-step/read',{sessionId:S.fsSession.sessionId,pronunciationScore:score,toneAccuracy:tone});
if(r.needsRetry)showStatus('еҸ‘йҹі'+score+'еҲҶпјҢжңӘиҫҫ70еҲҶ',false);
else{S.fsSession.currentStep='write';setTimeout(R,800);}
}catch(e){if(score>=70){S.fsSession.currentStep='write';R();}else showStatus('йңҖйҮҚиҜ•',false);}}

async function doFsWrite(correct,score){
try{await post('/five-step/write',{sessionId:S.fsSession.sessionId,strokeCorrect:correct,structureScore:score});
S.fsSession.currentStep='use';setTimeout(R,800);
}catch(e){S.fsSession.currentStep='use';R();}}

async function doFsUse(){
const sentence=document.getElementById('fsSentence')?.value||'';if(!sentence)return;
try{const r=await post('/five-step/use',{sessionId:S.fsSession.sessionId,sentence});
document.getElementById('useResult').innerHTML=`<div class="nt ${r.isValid?'ns':'nd'}" style="margin-top:8px">${r.feedback}</div>`;
if(r.isValid){S.fsSession.currentStep='test';setTimeout(R,1200);}
}catch(e){S.fsSession.currentStep='test';R();}}

async function doFsTest(){
const ans=document.getElementById('fsDictation')?.value||'';if(!ans)return;
const w=S.fsWords[S.fsSession.currentWordIndex];
try{const r=await post('/five-step/test',{sessionId:S.fsSession.sessionId,dictationAnswer:ans,quizAnswer:ans===w.character});
document.getElementById('testResult').innerHTML=`<div class="nt ${r.overallMastered?'ns':'nw'}" style="margin-top:8px">${r.overallMastered?'рҹҺү жҺҢжҸЎпјҒ':'йңҖиҰҒз»§з»ӯз»ғд№ '}</div>`;

if(adv.isComplete){setTimeout(async()=>{try{const rpt=await get('/five-step/report/'+S.fsSession.sessionId);
document.getElementById('fsReport').innerHTML=`<div class="sg"><div class="si"><div class="v" style="color:var(--s)">${rpt.masteryRate}%</div><div class="l">жҺҢжҸЎзҺҮ</div></div>

<div class="bg"><button class="btn bp" onclick="S.fsSession=null;R()">иҝ”еӣһ</button></div>`;}catch(e){}},500);}
else setTimeout(R,1500);}catch(e){}
}catch(e){showStatus('еҗҺз«ҜжңӘиҝһжҺҘ',false);}}
