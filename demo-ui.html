body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--g50);color:var(--g9);line-height:1.6}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:#fff;overflow:hidden}
.hd{background:linear-gradient(135deg,var(--p),#7C3AED);color:#fff;padding:20px;text-align:center}
.hd h1{font-size:20px;font-weight:700}.hd p{font-size:13px;opacity:.8;margin-top:4px}
.ui{display:flex;justify-content:center;gap:10px;margin-top:12px;font-size:12px;flex-wrap:wrap}
.ui span{background:rgba(255,255,255,.2);padding:4px 12px;border-radius:20px}
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--g2);position:sticky;top:0;z-index:10;overflow-x:auto}
.tab{flex:none;padding:12px 13px;font-size:12px;color:var(--g5);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.2s}
.tab.active{color:var(--p);border-bottom-color:var(--p);font-weight:600}
.tab:hover{color:var(--p);background:var(--pl)}
.ct{padding:16px 16px 24px}
.cd{background:#fff;border:1px solid var(--g2);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.tt{font-size:15px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:.2s}
.bp{background:var(--p);color:#fff}.bp:hover{background:#4338CA}.bs{background:var(--s);color:#fff}
.bw{background:var(--w);color:#fff}.bd{background:var(--d);color:#fff}
.bo{background:#fff;color:var(--p);border:1px solid var(--p)}
.bsm{padding:6px 12px;font-size:12px}.btn:disabled{opacity:.5;cursor:not-allowed}
.bg{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.msg{max-width:85%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;animation:fi .3s}
.mai{background:var(--pl);color:var(--g7);align-self:flex-start;border-bottom-left-radius:4px}
.mch{background:var(--sl);color:var(--g7);align-self:flex-end;border-bottom-right-radius:4px}
.ml{font-size:11px;font-weight:600;margin-bottom:2px}.mai .ml{color:var(--p)}.mch .ml{color:var(--s)}
.ia{display:flex;gap:8px;margin-top:12px}
.ia input,.ia textarea{flex:1;padding:10px 14px;border:1px solid var(--g3);border-radius:8px;font-size:14px;outline:none;font-family:inherit}
.ia input:focus,.ia textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.pb{height:8px;background:var(--g2);border-radius:4px;overflow:hidden;margin:8px 0}
.pf{height:100%;border-radius:4px;transition:width .5s}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:8px 0}
.sg3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:8px 0}
.si{text-align:center;padding:12px;background:var(--g50);border-radius:8px}
.si .v{font-size:24px;font-weight:700}.si .l{font-size:11px;color:var(--g5)}
.b{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500}
.b-s{background:var(--sl);color:#065F46}.b-w{background:var(--wl);color:#92400E}
.b-d{background:var(--dl);color:#991B1B}.b-p{background:var(--pl);color:#3730A3}
.nt{padding:12px;border-left:4px solid;border-radius:0 8px 8px 0;margin-bottom:8px;font-size:13px;animation:fi .3s}
.ni{border-color:var(--p);background:var(--pl)}.nw{border-color:var(--w);background:var(--wl)}
.ns{border-color:var(--s);background:var(--sl)}.nd{border-color:var(--d);background:var(--dl)}
.wc{display:flex;gap:4px;margin:8px 0}
.cb{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:2px solid;border-radius:8px;font-size:20px;font-weight:600}
.cc{border-color:var(--s);color:var(--s);background:var(--sl)}.cw{border-color:var(--d);color:var(--d);background:var(--dl)}
.scg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.sc{padding:12px;border:1px solid var(--g2);border-radius:8px;cursor:pointer;transition:.2s;text-align:center}
.sc:hover,.sc.sel{border-color:var(--p);background:var(--pl)}
.sc .em{font-size:28px;display:block;margin-bottom:4px}.sc .nm{font-size:13px;font-weight:600}
.sn{font-size:52px;font-weight:800;background:linear-gradient(135deg,var(--w),var(--d));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.gb{display:flex;gap:4px;margin:8px 0;flex-wrap:wrap}
.gbtn{padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid var(--g3);background:#fff;transition:.2s}
.gbtn.act{background:var(--p);color:#fff;border-color:var(--p)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th,.tbl td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--g2)}
.tbl th{font-weight:600;color:var(--g5);font-size:12px}
.chat{display:flex;flex-direction:column;gap:8px}
.sub-nav{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px}
.sub-card{flex:none;padding:10px 14px;border:1px solid var(--g2);border-radius:10px;cursor:pointer;transition:.2s;text-align:center;min-width:90px}
.sub-card:hover,.sub-card.act{border-color:var(--p);background:var(--pl)}
.sub-card .em{font-size:22px;display:block}.sub-card .nm{font-size:12px;font-weight:600;margin-top:2px}.sub-card .ds{font-size:10px;color:var(--g5)}
.tr{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;margin:16px auto;font-weight:700}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}.ap{animation:pulse 1s infinite}
</style>
</head>
<body>
<div class="app">
  <div class="hd">
    <h1>🎓 K12家庭作业AI辅导</h1>
    <p>孩子做 · AI盯 · 产品催 · 家长看</p>

  </div>
  <div class="tabs" id="tabs">
    <div class="tab active" data-t="home">🏠首页</div>
    <div class="tab" data-t="mvpreport">📊学情大报告</div>
    <div class="tab" data-t="minireport">📋单次小报告</div>
    <div class="tab" data-t="preview">📚预习</div>
    <div class="tab" data-t="chinese">📖语文</div>
    <div class="tab" data-t="math">🔢数学</div>
    <div class="tab" data-t="english">🌍英语</div>

const OMQ=[{x:'12+8',a:20},{x:'25-7',a:18},{x:'6×9',a:54},{x:'36÷4',a:9},{x:'15+27',a:42}];
const COACH={cant_recite:{sit:'孩子背诵时背不出来',wr:'你怎么又背不出来！都读了多少遍了！',ri:'没关系，我们先一起读三遍，分段来记，不着急。',tips:['将长文拆成2-3句一组','利用挖空法逐步增加遮挡','睡前背一遍、早起复习'],cat:'oral'},reading_mistakes:{sit:'朗读时频繁读错字、跳字',wr:'又读错了！这个字教了多少遍了！',ri:'这个字确实有点难，我们一起看看。用手指着，一个字一个字地读。',tips:['用手指逐字朗读','先听范读再跟读','每次只纠正1-2个错误'],cat:'oral'},dawdling:{sit:'写作业时磨蹭拖延',wr:'你快点写！磨磨蹭蹭的！',ri:'我们把作业分成几个小任务，先完成第一个，10分钟就够了。',tips:['番茄钟：10分钟专注+2分钟休息','大任务拆成小任务打勾','写前先收拾桌面'],cat:'written'},messy_writing:{sit:'书写潦草、字迹不工整',wr:'写的什么鬼！擦掉重写！',ri:'这几个字写得挺好的，如果每个字都能像这样就更棒了。',tips:['先肯定写得好的字','一次只改善一个方面','用描红本建立肌肉记忆'],cat:'written'},too_many_errors:{sit:'作业错误很多',wr:'怎么错这么多！上课有没有听讲？',ri:'没关系，错误说明这些地方还需要多练习。我们一起看看哪些是粗心错的。',tips:['区分粗心错和不会做','先解决不会做的题','关注进步而非绝对正确率'],cat:'written'},refuses_homework:{sit:'抗拒做作业，哭闹发脾气',wr:'不写作业怎么行！别人都在写！',ri:'我知道你现在不想写。我们先休息5分钟，然后从最简单的开始，好不好？',tips:['先接纳孩子的情绪','了解抗拒的真正原因','从最擅长的科目开始'],cat:'oral'}};
const GC={lower:{lb:'1-2年级(低段)',sty:'趣味互动',ses:20,foc:8,ui:'简洁',on:['✨趣味动画','✏️笔顺引导','🔤拼音朗读','🔢简单口算','📖短时长任务'],off:['逻辑引导','深度错题分析','时间管理','议论文写作']},middle:{lb:'3-4年级(中段)',sty:'引导式',ses:30,foc:12,ui:'标准',on:['📋复述提纲','✍️作文素材','📊错题归纳','📖阅读理解','🗣基础口语','📝课文背诵'],off:['逻辑引导','深度错题分析','时间管理']},upper:{lb:'5-6年级(高段)',sty:'自主式',ses:45,foc:20,ui:'高级',on:['🧠逻辑引导','🔍深度错题分析','⏰时间管理','🗣口语表达','✍️议论文写作','📐复杂习题'],off:[]}};
function gband(){return S.grade<=2?'lower':S.grade<=4?'middle':'upper';}
function gcfg(){return GC[gband()];}

// ===== SUB-NAV HELPER =====
function subNav(tab,items){
return `<div class="sub-nav">${items.map(it=>`<div class="sub-card${S.sub[tab]===it.id?' act':''}" onclick="S.sub.${tab}='${it.id}';R()"><span class="em">${it.em}</span><div class="nm">${it.nm}</div><div class="ds">${it.ds}</div></div>`).join('')}</div>`;
}

// ===== TAB 1: HOME =====

const plan=[{ic:'🔄',t:'间隔重复复习',su:'综合',tm:'5分钟',st:'done'},{ic:'✏️',t:'错题订正·减法退位',su:'数学',tm:'8分钟',st:'done'},{ic:'📝',t:'计算题练习',su:'数学',tm:'10分钟',st:'cur'},{ic:'📖',t:'生字词听写',su:'语文',tm:'10分钟',st:'todo'},{ic:'🌍',t:'口语对话练习',su:'英语',tm:'7分钟',st:'todo'},{ic:'🎤',t:'晨读朗读(碎片化)',su:'语文',tm:'5分钟',st:'todo'}];

<div style="font-size:13px;color:var(--g5)">预计40分钟 · ${cfg.sty}模式</div>

${plan.map(t=>`<div style="display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;background:${t.st==='cur'?'var(--pl)':'var(--g50)'};margin-top:6px">
<span style="font-size:18px">${t.ic}</span><div style="flex:1"><div style="font-size:13px;font-weight:${t.st==='cur'?600:400}">${t.t}</div>

<div class="cd"><div class="tt">⏰ 碎片化学习提醒</div>
<div style="display:flex;flex-direction:column;gap:6px;font-size:13px">

<div style="display:flex;justify-content:space-between;padding:8px;background:var(--g1);border-radius:8px"><span>🌙 睡前 21:00</span><span class="b" style="background:var(--g2);color:var(--g5)">未到</span></div></div></div>
<div class="cd"><div class="tt">💡 元认知提示</div>
<div class="msg mai"><div class="ml">🤖 AI学习助手</div>开始之前，想一想：你觉得今天要学的内容，哪里会比较难呢？先回忆一下昨天学了什么吧！</div></div>

<div style="font-size:13px;color:var(--g5);margin-bottom:8px">AI已智能规划完成顺序</div>

// ===== MVP-学情报告Page =====
function rMvpReport(){
const subs=[{id:'daily',em:'📅',nm:'今日快照',ds:'实时学情'},{id:'weekly',em:'📊',nm:'本周报告',ds:'全科分析'},{id:'summary',em:'📋',nm:'作业摘要',ds:'分享老师'},{id:'anomaly',em:'⚠️',nm:'异常检测',ds:'行为监测'}];
let h='';
h+=subNav('mvpreport',subs);
if(S.sub.mvpreport==='daily') h+=rMvpDaily();
else if(S.sub.mvpreport==='weekly') h+=rMvpWeekly();
else if(S.sub.mvpreport==='summary') h+=rMvpSummaryTab();
else h+=rMvpAnomalyTab();
return h;
}

function rMvpDaily(){
// Render instant local snapshot, then overlay with backend data
const t=new Date(),dateStr=t.toISOString().slice(0,10);
const weekday=['日','一','二','三','四','五','六'][t.getDay()];
return `<div id="mvpDailyResult">
<div class="cd"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
<div><div style="font-size:15px;font-weight:700">📅 ${t.getMonth()+1}月${t.getDate()}日 周${weekday}</div>
<div style="font-size:12px;color:var(--g5)">小明的学习快照</div></div>
<span class="b b-s">⏳ 加载中</span></div>
<div class="sg3"><div class="si"><div class="v">--</div><div class="l">分钟</div></div>

<div class="si"><div class="v">--%</div><div class="l">正确率</div></div></div></div></div>`;
}

function rMvpWeekly(){

function openTransferPractice(origQ,kp,cause){
  // 生成3道举一反三题：同知识点、同错因、升难度
  var qBank={
    '减法退位':{sameKP:'82-45=?（同知识点：退位减法）',sameCause:'71-28=?（同错因：注意退位）',harder:'1000-367=?（升难度：三位数退位）',answers:{'82-45=?':'37','71-28=?':'43','1000-367=?':'633'}},
    '运算顺序':{sameKP:'5+3×4=?（同知识点：混合运算）',sameCause:'12-2×3=?（同错因：先乘后减）',harder:'(8+2)×3-5=?（升难度：带括号）',answers:{'5+3×4=?':'17','12-2×3=?':'6','(8+2)×3-5=?':'25'}},
    '应用题':{sameKP:'甲有5个苹果，乙是甲的3倍，乙有几个？（同知识点）',sameCause:'一条路长12km，走了一半，还剩多少？（同错因：审题）',harder:'甲乙共有20个球，甲比乙多4个，各有几个？（升难度）',answers:{'甲有5个苹果，乙是甲的3倍，乙有几个？':'15个','一条路长12km，走了一半，还剩多少？':'6km','甲乙共有20个球，甲比乙多4个，各有几个？':'甲12乙8'}},
  };
  var bank=qBank[kp]||{sameKP:kp+'同知识点练习题',sameCause:cause+'同错因练习题',harder:kp+'升难度练习题',answers:{}};
  var questions=[
    {label:'同知识点',tag:kp,color:'#3B82F6',q:bank.sameKP},
    {label:'同错因',tag:cause,color:'#F59E0B',q:bank.sameCause},
    {label:'升难度',tag:'进阶',color:'#8B5CF6',q:bank.harder}];
  var modal=document.createElement('div');
  modal.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:999';
  modal.innerHTML='<div style="background:#fff;border-radius:16px;padding:20px;max-width:420px;width:95%;max-height:85vh;overflow-y:auto">'
  +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:16px;font-weight:700">🔄 举一反三 · '+kp+'</div>'
  +'<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="background:none;border:none;font-size:20px;cursor:pointer">✕</button></div>'
  +'<div style="font-size:12px;color:var(--g5);margin-bottom:12px">原题：'+origQ+' → 生成3道针对性练习</div>'
  +questions.map(function(item,i){return '<div style="padding:12px;background:var(--g50);border-radius:8px;margin-bottom:8px">'
  +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="padding:2px 8px;background:'+item.color+';color:#fff;border-radius:10px;font-size:10px;font-weight:600">'+item.label+'</span><span class="b b-d" style="font-size:10px">'+item.tag+'</span></div>'
  +'<div style="font-size:14px;font-weight:600;margin-bottom:6px">'+item.q.split('（')[0]+'</div>'
  +'<div style="font-size:11px;color:var(--g5);margin-bottom:6px">'+item.q.split('（')[1].replace('）','')+'</div>'
  +'<div style="display:flex;gap:8px"><input type="text" id="tfAns'+i+'" placeholder="作答" style="flex:1;padding:6px;border:1px solid var(--g2);border-radius:6px;font-size:13px">'
  +'<button onclick="checkTfAns('+i+',\''+item.q.split('（')[0].replace(/'/g,'')+'\',this)" style="padding:6px 12px;background:'+item.color+';color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer">提交</button></div>'
  +'<div id="tfFb'+i+'"></div></div>';}).join('')
  +'</div>';
  window.checkTfAns=function(idx,q,btn){
    var ans=document.getElementById('tfAns'+idx);if(!ans||!ans.value.trim())return;
    var expected=bank.answers[q];
    var correct=expected?ans.value.trim()===expected:true;
    document.getElementById('tfFb'+idx).innerHTML=correct
    ?'<div style="margin-top:4px;padding:6px;background:#ECFDF5;border-radius:6px;font-size:12px;color:#065F46">✅ 正确！</div>'
    :'<div style="margin-top:4px;padding:6px;background:#FEF2F2;border-radius:6px;font-size:12px;color:#991B1B">❌ 正确答案：'+(expected||'—')+'</div>';
    btn.disabled=true;btn.style.opacity='0.5';
  };
  document.body.appendChild(modal);
}

function openChainRecite(){
  var sentences=[
    {id:1,text:'桂花盛开的时候，不说香飘十里，至少前后十几家邻居，没有不浸在桂花香里的。'},
    {id:2,text:'父亲指点花名，我的回答总是"桂花"。',isWeak:true},
    {id:3,text:'村子里的桂花树不算多。',isWeak:true},
    {id:4,text:'全年，整个村子都浸在桂花的香气里。'}];
  var modal=document.createElement('div');
  modal.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:999';
  var idx=0;
  function renderChain(){
    var s=sentences[idx];
    var isLast=idx>=sentences.length-1;
    modal.querySelector('.chain-body').innerHTML=
    '<div style="font-size:12px;color:var(--g5);margin-bottom:8px">第'+(idx+1)+'/'+sentences.length+'段</div>'
    +(idx>0?'<div style="padding:10px;background:#ECFDF5;border-radius:8px;margin-bottom:8px;font-size:13px;color:#065F46">上一段：'+sentences[idx-1].text+'</div>':'')
    +(s.isWeak?'<div style="padding:12px;background:#FEF3C7;border-radius:8px;margin-bottom:8px;font-size:14px;color:#92400E;text-align:center">请背诵下一段 ⬇️</div>'
    +'<div style="display:flex;gap:8px"><input type="text" id="chainAns" placeholder="背诵本段内容..." style="flex:1;padding:8px;border:1px solid var(--g2);border-radius:8px;font-size:13px">'
    +'<button onclick="document.getElementById(\'chainReveal\').style.display=\'block\'" style="padding:8px 12px;background:var(--w);color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer">看答案</button></div>'
    +'<div id="chainReveal" style="display:none;margin-top:8px;padding:8px;background:#ECFDF5;border-radius:6px;font-size:12px;color:#065F46">原文：'+s.text+'</div>'
    :'<div style="padding:10px;background:#ECFDF5;border-radius:8px;font-size:13px;color:#065F46">✅ '+s.text+'</div>')
    +'<button onclick="'+(isLast?'showStatus(\'接龙背诵完成\');this.closest(\'div[style*=fixed]\').remove()':'advanceChain()')
    +'" style="margin-top:12px;width:100%;padding:10px;background:var(--p);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer">'+(isLast?'✅ 完成':'下一段 →')+'</button>';
  }
  window.advanceChain=function(){idx++;renderChain();};
  modal.innerHTML='<div style="background:#fff;border-radius:16px;padding:20px;max-width:420px;width:95%;max-height:85vh;overflow-y:auto">'
  +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:16px;font-weight:700">🔗 接龙背诵</div>'
  +'<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="background:none;border:none;font-size:20px;cursor:pointer">✕</button></div>'
  +'<div style="font-size:12px;color:var(--g5);margin-bottom:12px">系统展示上一段，你来背下一段</div>'
  +'<div class="chain-body"></div></div>';
  document.body.appendChild(modal);
  renderChain();
}

function rDictation(){
if(S.dPhase==='ready')return `<div class="cd"><div class="tt">📝 生字词听写</div><div style="font-size:13px;color:var(--g5)">共${DW.length}个词语</div>
<div style="margin-top:12px;padding:12px;background:var(--pl);border-radius:8px;font-size:13px"><strong>播报流程：</strong>词语→组词→例句→重复词语</div>
<div class="bg"><button class="btn bp" onclick="S.dPhase='writing';S.dStep=0;S.dRes=[];R();setTimeout(()=>document.getElementById('di')?.focus(),100)">📢 开始听写</button></div></div>`;
if(S.dPhase==='writing'){const w=DW[S.dStep];
return `<div class="cd"><div class="tt">📢 听写中</div><div style="font-size:12px;color:var(--g5)">第${S.dStep+1}/${DW.length}个词</div>
<div class="pb"><div class="pf" style="width:${S.dStep/DW.length*100}%;background:var(--s)"></div></div></div>
<div class="cd" style="text-align:center;padding:20px"><div style="font-size:14px;color:var(--g5)">🔊 正在播报...</div>

<div class="ia" style="justify-content:center"><input type="text" id="di" placeholder="写出你听到的词语" style="max-width:200px;text-align:center;font-size:18px" onkeydown="if(event.key==='Enter')subD()">
<button class="btn bp" onclick="subD()">提交</button></div></div>`;}
const ok=S.dRes.filter(r=>r.ok).length;
return `<div class="cd"><div class="tt">📊 听写报告</div><div class="sg">
<div class="si"><div class="v" style="color:${ok>=3?'var(--s)':'var(--w)'}">${Math.round(ok/DW.length*100)}%</div><div class="l">正确率</div></div>
<div class="si"><div class="v">${ok}/${DW.length}</div><div class="l">正确/总数</div></div></div>
${S.dRes.map(r=>`<div style="padding:8px 0;border-bottom:1px solid var(--g1)"><div style="display:flex;justify-content:space-between;align-items:center">
<span style="font-size:16px;font-weight:600">${r.exp}</span>${r.ok?'<span class="b b-s">✓正确</span>':'<span class="b b-d">✗错误</span>'}</div>
${!r.ok?`<div class="wc" style="margin-top:6px">${r.exp.split('').map((ch,i)=>{const c=(r.act||'')[i]||'?';return `<div class="cb ${ch===c?'cc':'cw'}">${c}</div>`;}).join('')}

<div class="bg"><button class="btn bp" onclick="S.dPhase='ready';S.dStep=0;S.dRes=[];R()">再来一组</button></div>`;
}

function rFiveStep(){
if(!S.fsSession)return `<div class="cd"><div class="tt">✏️ 识读写用测 · 五步法</div>
<div style="font-size:13px;color:var(--g5);margin-bottom:12px">识→读→写→用→测，每步有通过标准</div>
<div class="bg"><button class="btn bp" onclick="startFiveStep()">▶ 开始五步法学习</button></div></div>`;
const fs=S.fsSession,w=S.fsWords[fs.currentWordIndex];
if(fs.isComplete)return `<div class="cd"><div class="tt">✅ 五步法学习完成！</div><div id="fsReport">加载报告中...</div></div>`;
const steps=['识','读','写','用','测'],stepMap=['recognize','read','write','use','test'];
const si=stepMap.indexOf(fs.currentStep);
return `<div class="cd"><div class="tt">第${fs.currentWordIndex+1}/${fs.totalWords}个字: <span style="font-size:24px;color:var(--p)">${w.character}</span></div>
<div style="font-size:12px;color:var(--g5)">拼音: ${w.pinyin} · 含义: ${w.meaning}</div>
<div class="pb"><div class="pf" style="width:${(si/5)*100}%;background:var(--s)"></div></div>
<div style="display:flex;gap:4px;margin:8px 0">${steps.map((s,i)=>`<span class="b ${i<si?'b-s':i===si?'b-p':''}" style="${i>si?'background:var(--g1);color:var(--g5)':''}">${i<si?'✓':''}${s}</span>`).join('')}</div></div>
${fs.currentStep==='recognize'?`<div class="cd"><div class="tt">👁 识 · 认识字形</div><div id="recogResult" class="msg mai"><div class="ml">🤖 AI</div>点击按钮，AI将讲解这个字</div>

<div class="sg3"><div class="si" style="cursor:pointer" onclick="doFsRead(85,90)"><div class="v" style="color:var(--s)">😊</div><div class="l">好(85分)</div></div>

<div class="si" style="cursor:pointer" onclick="doFsRead(45,40)"><div class="v" style="color:var(--d)">😰</div><div class="l">重试(45)</div></div></div></div>`:''}
${fs.currentStep==='write'?`<div class="cd"><div class="tt">✍️ 写 · 书写练习</div>
<div class="sg"><div class="si" style="cursor:pointer" onclick="doFsWrite(true,85)"><div class="v">✓</div><div class="l">笔顺正确</div></div>
<div class="si" style="cursor:pointer" onclick="doFsWrite(false,50)"><div class="v">✗</div><div class="l">需描红</div></div></div></div>`:''}
${fs.currentStep==='use'?`<div class="cd"><div class="tt">💬 用 · 造句应用</div>
<div class="ia"><input type="text" id="fsSentence" placeholder="用"${w.character}"造句" onkeydown="if(event.key==='Enter')doFsUse()">

${fs.currentStep==='test'?`<div class="cd"><div class="tt">📝 测 · 综合测试</div>

const API=window.location.origin+'/api';
async function post(url,body){const r=await fetch(API+url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return r.json();}
async function get(url){return(await fetch(API+url)).json();}
function showStatus(msg,ok=true){const d=document.createElement('div');d.className='nt '+(ok?'ns':'nd');d.style.cssText='position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:99;max-width:400px;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.15)';
d.textContent=(ok?'✅ ':'❌ ')+msg;document.body.appendChild(d);setTimeout(()=>d.remove(),2500);}

function subM(){const i=document.getElementById('mi'),a=parseInt(i.value);if(isNaN(a))return;const p=MP[S.mStep],ok=a===p.c;
S.mRes.push({x:p.x,a,c:p.c,ok});S.mStep++;R();const ni=document.getElementById('mi');if(ni){ni.value='';ni.focus();}}

function subD(){const i=document.getElementById('di'),a=i.value.trim();if(!a)return;const w=DW[S.dStep];
post('/classify',{content:w.w+' 听写',subject:'chinese'}).catch(()=>{});
S.dRes.push({exp:w.w,act:a,ok:a===w.w});S.dStep++;if(S.dStep>=DW.length)S.dPhase='report';R();
const ni=document.getElementById('di');if(ni){ni.value='';ni.focus();}}

function subRD(d){RI[S.rStep].df=d;S.rStep++;S.rPhase=S.rStep>=RI.length?'done':'q';R();}
function mErr(id){const e=S.errors.find(x=>x.id===id);if(e){e.sk++;if(e.sk>=3)e.st='mastered';else e.st='reviewing';}R();}

async function subOM(){const i=document.getElementById('omi'),a=i.value.trim();if(!a)return;const q=OMQ[S.omStep];
try{const r=await post('/oral-math/judge',{expression:q.x,expectedAnswer:q.a,spokenText:a});
S.omRes.push({x:q.x,ans:a,c:q.a,ok:r.isCorrect});showStatus(r.isCorrect?'正确！':'错误',r.isCorrect);
}catch(e){S.omRes.push({x:q.x,ans:a,c:q.a,ok:false});showStatus('后端未连接',false);}
S.omStep++;R();const ni=document.getElementById('omi');if(ni){ni.value='';ni.focus();}}

async function startFocus(){
try{const session=await post('/focus/start',{childId:'xiaoming',config:{focusMinutes:gcfg().foc,breakMinutes:2,totalRounds:3}});
S.focusSessionId=session.sessionId;showStatus('专注会话已创建');
}catch(e){showStatus('后端未连接，本地计时',false);}
S.fPhase='run';S.fRound=1;S.fFocus=true;S.fSec=gcfg().foc*60;
S.fTid=setInterval(()=>{S.fSec--;if(S.fSec<=0)skipFocus();R();},1000);R();}
function skipFocus(){if(S.fFocus){S.fFocus=false;S.fSec=120;
if(S.focusSessionId)post('/focus/complete-round',{sessionId:S.focusSessionId}).catch(()=>{});
}else{S.fRound++;if(S.fRound>3){stopFocus();return;}S.fFocus=true;S.fSec=gcfg().foc*60;}R();}
function stopFocus(){if(S.fTid)clearInterval(S.fTid);S.fTid=null;S.fPhase='ready';S.focusSessionId=null;R();}

async function doWriteEval(){
const n=70+Math.floor(Math.random()*25),a=60+Math.floor(Math.random()*35),sp=10+Math.floor(Math.random()*20);
try{const r=await post('/focus/writing-eval',{neatnessRaw:n,correctCount:Math.round(a/10),totalCount:10,actualMinutes:sp,expectedMinutes:15});
S.wEval={n:r.neatnessScore,a:r.accuracyScore,s:r.speedScore,o:r.overallScore};showStatus('评分: '+r.overallScore+'分');
}catch(e){S.wEval={n,a,s:50,o:Math.round(n*.3+a*.5+50*.2)};showStatus('本地评分',false);}R();}

function openTwoPhaseModal(title,subtitle,originals,variants,tip,answers,practiceKey){
  var modal=document.createElement('div');
  modal.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:999';
  var state={phase:'retry',idx:0,retryCorrect:0,retryTotal:originals.length,variantCorrect:0,variantIdx:0};
  function render(){
    if(state.phase==='retry'){
      if(state.idx>=originals.length){state.phase='variant';state.variantIdx=0;render();return;}
      var o=originals[state.idx];
      modal.querySelector('.modal-body').innerHTML=
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px"><span style="font-size:11px;padding:2px 8px;background:#FEE2E2;color:#DC2626;border-radius:10px">阶段一：错题重练</span><span style="font-size:11px;color:var(--g5)">'+(state.idx+1)+'/'+originals.length+'</span></div>'
      +'<div style="padding:12px;background:#FEF2F2;border-radius:8px;margin-bottom:10px;border-left:3px solid #EF4444">'
      +'<div style="font-size:13px;font-weight:600;margin-bottom:4px">'+o.q+'</div>'
      +'<div style="font-size:11px;color:var(--d)">上次你的答案：<s>'+o.wrong+'</s></div></div>'
      +'<div style="padding:8px;background:#FEF3C7;border-radius:8px;font-size:12px;margin-bottom:10px">💡 '+tip+'</div>'
      +'<div style="display:flex;gap:8px"><input type="text" id="retryAns" placeholder="重新作答" style="flex:1;padding:8px;border:1px solid var(--g2);border-radius:8px;font-size:14px" onkeydown="if(event.key===\'Enter\')checkRetry()">'
      +'<button onclick="checkRetry()" style="padding:8px 16px;background:var(--p);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer">提交</button></div>'
      +'<div id="retryFeedback"></div>';
    } else if(state.phase==='variant'){
      if(state.variantIdx>=variants.length||state.variantCorrect>=3){
        state.phase='done';render();return;
      }
      var v=variants[state.variantIdx];
      var phaseLabel=state.retryTotal>0?'<span style="font-size:11px;padding:2px 8px;background:#DBEAFE;color:#1E40AF;border-radius:10px">阶段二：举一反三</span>':'';
      modal.querySelector('.modal-body').innerHTML=
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">'+phaseLabel+'<span style="font-size:11px;color:var(--g5)">连续答对 '+state.variantCorrect+'/3</span></div>'
      +'<div style="padding:12px;background:#EFF6FF;border-radius:8px;margin-bottom:10px;border-left:3px solid #3B82F6">'
      +'<div style="font-size:13px;font-weight:600">'+v+'</div></div>'
      +'<div style="padding:8px;background:#FEF3C7;border-radius:8px;font-size:12px;margin-bottom:10px">💡 '+tip+'</div>'
      +'<div style="display:flex;gap:8px"><input type="text" id="variantAns" placeholder="作答" style="flex:1;padding:8px;border:1px solid var(--g2);border-radius:8px;font-size:14px" onkeydown="if(event.key===\'Enter\')checkVariant()">'
      +'<button onclick="checkVariant()" style="padding:8px 16px;background:#3B82F6;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer">提交</button></div>'
      +'<div id="variantFeedback"></div>';
    } else {
      var mastered=state.variantCorrect>=3;
      var showRetry=state.retryTotal>0;
      // Mark mastery on the weekly report page
      if(mastered&&practiceKey){markMasteredOnPage(practiceKey);}
      modal.querySelector('.modal-body').innerHTML=
      '<div style="text-align:center;padding:20px">'
      +'<div style="font-size:32px;margin-bottom:8px">'+(mastered?'🎉':'💪')+'</div>'
      +'<div style="font-size:16px;font-weight:700;margin-bottom:12px">'+(mastered?'已掌握！':'继续加油')+'</div>'
      +'<div style="display:flex;justify-content:center;gap:16px;margin-bottom:16px">'
      +(showRetry?'<div style="text-align:center"><div style="font-size:20px;font-weight:700;color:'+(state.retryCorrect===state.retryTotal?'#10B981':'#EF4444')+'">'+state.retryCorrect+'/'+state.retryTotal+'</div><div style="font-size:11px;color:var(--g5)">错题重练</div></div>':'')
      +'<div style="text-align:center"><div style="font-size:20px;font-weight:700;color:'+(state.variantCorrect>=3?'#10B981':'#F59E0B')+'">'+state.variantCorrect+'/3</div><div style="font-size:11px;color:var(--g5)">'+(showRetry?'举一反三':'同知识点练习')+'</div></div></div>'
      +'<div style="font-size:12px;color:var(--g5);margin-bottom:12px">'+(mastered?'连续答对3道新题，该知识点已标记为掌握':'新题还需巩固，下次会继续推荐')+'</div>'
      +'<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="padding:10px 24px;background:var(--p);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer">完成</button></div>';
    }
  }
  window.checkRetry=function(){
    var ans=document.getElementById('retryAns');if(!ans||!ans.value.trim())return;
    var o=originals[state.idx];
    var correct=ans.value.trim()===o.right;
    if(correct){state.retryCorrect++;document.getElementById('retryFeedback').innerHTML='<div style="margin-top:8px;padding:8px;background:#ECFDF5;border-radius:8px;font-size:13px;color:#065F46">✅ 正确！这次答对了</div>';
    }else{document.getElementById('retryFeedback').innerHTML='<div style="margin-top:8px;padding:8px;background:#FEF2F2;border-radius:8px;font-size:13px;color:#991B1B">❌ 还是不对，正确答案是 <strong>'+o.right+'</strong></div>';}
    setTimeout(function(){state.idx++;render();},1200);
  };
  window.checkVariant=function(){
    var ans=document.getElementById('variantAns');if(!ans||!ans.value.trim())return;
    var v=variants[state.variantIdx];
    var expected=answers[v];
    var correct=expected?ans.value.trim()===expected:true;
    if(correct){state.variantCorrect++;document.getElementById('variantFeedback').innerHTML='<div style="margin-top:8px;padding:8px;background:#ECFDF5;border-radius:8px;font-size:13px;color:#065F46">✅ 正确！连续答对 '+state.variantCorrect+'/3</div>';
    }else{state.variantCorrect=0;document.getElementById('variantFeedback').innerHTML='<div style="margin-top:8px;padding:8px;background:#FEF2F2;border-radius:8px;font-size:13px;color:#991B1B">❌ 不对，正确答案是 <strong>'+expected+'</strong>，连续计数重置</div>';}
    setTimeout(function(){state.variantIdx++;render();},1200);
  };
  modal.innerHTML='<div style="background:#fff;border-radius:16px;padding:20px;max-width:420px;width:95%;max-height:85vh;overflow-y:auto">'
  +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
  +'<div style="font-size:16px;font-weight:700">'+title+'</div>'
  +'<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="background:none;border:none;font-size:20px;cursor:pointer">✕</button></div>'
  +'<div style="font-size:12px;color:var(--g5);margin-bottom:12px">'+subtitle+'</div>'
  +'<div class="modal-body"></div></div>';
  document.body.appendChild(modal);
  render();
}

function markMasteredOnPage(key){
  // Find all buttons that match this practice key and mark their parent as mastered
  var btns=document.querySelectorAll('button');
  for(var i=0;i<btns.length;i++){
    var b=btns[i];
    if(b.textContent.includes('练习')&&b.onclick&&b.onclick.toString().indexOf(key)!==-1){
      // Already handled below
    }
  }
  // Find the item in the weekly report by text content
  var items=document.querySelectorAll('div[style*="border-bottom"]');
  for(var j=0;j<items.length;j++){
    var item=items[j];
    if(item.textContent.indexOf(key)!==-1){
      // Check if already marked
      if(item.querySelector('.mastered-badge'))continue;
      var badge=document.createElement('span');
      badge.className='mastered-badge';
      badge.style.cssText='display:inline-block;padding:2px 8px;background:#10B981;color:#fff;border-radius:10px;font-size:10px;font-weight:600;margin-left:6px';
      badge.textContent='✅ 已掌握';
      // Insert badge after the first line
      var firstDiv=item.querySelector('div');
      if(firstDiv)firstDiv.appendChild(badge);
      // Disable the practice button in this item
      var btn=item.querySelector('button');
      if(btn){btn.disabled=true;btn.style.opacity='0.5';btn.textContent='✅ 已掌握';}
      break;
    }
  }
}
